<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Modern dark background matching your site -->
  <rect width="120" height="120" rx="30" fill="#0f172a" />
  <rect width="120" height="120" rx="30" fill="url(#sun)" opacity="0.1" />
  
  <g filter="url(#glow)" transform="translate(60, 60)">
    <!-- Awurudu Sun Rays -->
    <path d="M0 -35 L6 -16 L28 -28 L16 -6 L35 0 L16 6 L28 28 L6 16 L0 35 L-6 16 L-28 28 L-16 6 L-35 0 L-16 -6 L-28 -28 L-6 -16 Z" fill="url(#sun)" />
    <!-- Inner Core -->
    <circle r="10" fill="#ffffff" />
  </g>
</svg>